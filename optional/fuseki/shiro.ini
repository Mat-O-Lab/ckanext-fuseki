[main]
# Development
ssl.enabled = false

plainMatcher=org.apache.shiro.authc.credential.SimpleCredentialsMatcher
#iniRealm=org.apache.shiro.realm.text.IniRealm
iniRealm.credentialsMatcher = $plainMatcher

#localhostFilter=org.apache.jena.fuseki.authz.LocalhostFilter

[users]
# Implicitly adds "iniRealm =  org.apache.shiro.realm.text.IniRealm"
# NOTE: The password below is overwritten at container startup by the ADMIN_PASSWORD
# environment variable. Set ADMIN_PASSWORD in docker-compose.yml to control the password.
admin=admin

[roles]

[urls]
## Control functions open to anyone (health checks)
/$/status = anon
/$/ping   = anon

## Allow the UI to load without auth (Vue SPA + static assets)
/static/** = anon
/ = anon

## Admin and all data endpoints require HTTP Basic Auth
/$/** = authcBasic,user[admin]
/** = authcBasic,user[admin]
